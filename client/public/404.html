<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // GitHub Pages SPA routing fix
        // This script redirects 404 errors to index.html for client-side routing
        const path = window.location.pathname;
        const segments = path.split('/').filter(Boolean);
        
        // Reconstruct the path for the SPA
        const redirectPath = segments.length > 0 ? '/' + segments.join('/') : '/';
        
        // Store the redirect path in sessionStorage
        sessionStorage.redirect = redirectPath;
        
        // Redirect to index.html
        window.location.href = '/';
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
